<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>服务详情</title><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",Arial,sans-serif}body{background:#f5f7fb;color:#172033;line-height:1.75}a{text-decoration:none;color:#2563eb;font-weight:800}.top{background:linear-gradient(135deg,#3b82f6,#1e40af);color:white;padding:56px 20px}.wrap{max-width:1100px;margin:auto}.top h1{font-size:38px}.top p{max-width:760px;margin-top:12px}.btn,button{border:0;border-radius:999px;padding:12px 22px;font-weight:900;cursor:pointer;display:inline-block;transition:.25s}.btn{background:white;color:#1e40af;margin-top:18px;margin-right:8px}.btn.blue{background:#2563eb;color:white}.container{max-width:1100px;margin:auto;padding:34px 20px}.box,.card{background:white;border-radius:22px;padding:24px;box-shadow:0 8px 22px rgba(30,64,175,.08);margin-bottom:18px}.title{color:#1e3a8a;margin-bottom:12px}.tags span{display:inline-block;background:#eff6ff;color:#1e40af;padding:4px 10px;border-radius:999px;font-size:13px;margin:3px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.example img{width:100%;border-radius:16px;margin:12px 0;background:#f1f5f9;min-height:120px;object-fit:cover}.placeholder{height:160px;border-radius:16px;background:linear-gradient(135deg,#eff6ff,#f8fafc);display:grid;place-items:center;color:#64748b;margin:12px 0}.price{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.price-card{border:1px solid #e2e8f0;border-radius:18px;padding:18px}.price-card h3{color:#1e3a8a}.price-main{color:#2563eb;font-size:24px;font-weight:900;margin:8px 0}.notice{background:#eff6ff;border-left:5px solid #2563eb;border-radius:14px;padding:16px;color:#1e3a8a}li{margin-left:20px;color:#475569}@media(max-width:760px){.top h1{font-size:30px}}

.detail-examples.study-direct-mode{grid-template-columns:1fr}
.study-direct-mode .card{padding:28px}
.study-direct-mode .example-img,
.example-img{
  width:100%;
  max-width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  border:1px solid #dbeafe;
  background:#f8fafc;
  margin:14px 0;
  box-shadow:0 10px 28px rgba(30,64,175,.10);
}
.open-original{
  display:inline-block;
  margin:8px 0 10px;
  background:#2563eb;
  color:#fff;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:900;
}


.example-file{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:14px 0;
  padding:15px 16px;
  border-radius:16px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
}
.example-file span{
  color:#1e3a8a;
  font-weight:900;
}
.example-file a{
  background:#2563eb;
  color:#fff;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}
.example-img{
  width:100%;
  max-width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  border:1px solid #dbeafe;
  background:#f8fafc;
  margin:14px 0;
  box-shadow:0 10px 28px rgba(30,64,175,.10);
}
.open-original{
  display:inline-block;
  margin:8px 0 10px;
  background:#2563eb;
  color:#fff;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:900;
}
.card{display:flex;flex-direction:column}
.card ul{margin-top:auto}

</style></head><body>
<header class="top"><div class="wrap"><p><a href="/" style="color:white">← 返回首页</a></p><h1 id="name">服务详情</h1><p id="desc"></p><div class="tags" id="tags"></div><a href="/#order" class="btn">立即下单</a><a href="#pricing" class="btn">查看价目表</a></div></header>
<main class="container">
<section class="box"><h2 class="title">服务介绍</h2><p id="intro"></p></section>
<section class="box"><h2 class="title">常见流程</h2><ol id="process"></ol></section>
<section class="box"><h2 class="title">案例展示</h2><p style="color:#64748b;margin-bottom:16px">案例图片支持在内容管理后台填写图片链接。</p><div class="grid" id="examples"></div></section>
<section class="box" id="pricing"><h2 class="title">详细价目表</h2><div class="price" id="prices"></div></section>
<section class="box"><h2 class="title">注意事项</h2><ul id="notices"></ul><div class="notice" id="globalNote"></div></section>
</main>
<script>
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function slug(){let p=location.pathname.split("/").filter(Boolean);return p[1]||""}
async function load(){let r=await fetch("/api/site-content"),d=await r.json();let s=(d.services||[]).find(x=>x.slug===slug())||(d.services||[])[0];if(!s){document.body.innerHTML="未找到服务";return}document.title=s.name+" - 小蔡同学文档工作室";document.getElementById("examples").classList.toggle("study-direct-mode", s.slug==="study-web");name.textContent=s.name;desc.textContent=s.desc||"";intro.textContent=s.intro||s.desc||"";tags.innerHTML=(s.tags||[]).map(t=>`<span>${esc(t)}</span>`).join("");process.innerHTML=(s.process||[]).map(i=>`<li>${esc(i)}</li>`).join("");examples.innerHTML=(s.examples||[]).map(e=>`<div class="card example"><h3>${esc(e.title)}</h3><p>${esc(e.desc)}</p>${e.image?`<a class="open-original" href="${esc(e.image)}" target="_blank">打开原图查看</a><img class="example-img" src="${esc(e.image)}" alt="${esc(e.title)}">`:``}${e.file?`<div class="example-file"><span>📎 ${esc(e.fileName||"示例文件")}</span><a href="${esc(e.file)}" target="_blank">点击查看示例</a></div>`:(!e.image?`<div class="placeholder">暂无图片或文件，可在后台填写链接</div>`:``)}<ul>${(e.items||[]).map(i=>`<li>${esc(i)}</li>`).join("")}</ul></div>`).join("");prices.innerHTML=(s.pricing||[]).map(p=>`<div class="price-card"><h3>${esc(p.name)}</h3><div class="price-main">${esc(p.price)}</div><p>定金：<b>${esc(p.deposit)}</b></p><p>${esc(p.desc)}</p></div>`).join("");notices.innerHTML=(s.notices||[]).map(i=>`<li>${esc(i)}</li>`).join("");globalNote.textContent=d.pricingNote||""}
load();
</script></body></html>
