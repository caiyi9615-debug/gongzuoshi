<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>查询订单进度 - 小蔡同学文档工作室</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", Arial, sans-serif; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(59,130,246,.22), transparent 30%),
        radial-gradient(circle at 88% 20%, rgba(124,58,237,.13), transparent 28%),
        linear-gradient(135deg, #f8fbff, #eef4ff);
      color: #172033;
      padding: 22px;
    }
    .page { max-width: 980px; margin: 0 auto; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 48px; height: 48px; border-radius: 16px;
      display: grid; place-items: center; color: white; font-size: 22px; font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      box-shadow: 0 14px 30px rgba(37,99,235,.22);
    }
    .brand h1 { font-size: 22px; color: #1e3a8a; }
    .brand p { color: #64748b; font-size: 13px; margin-top: 3px; }
    a { color: #2563eb; text-decoration: none; font-weight: bold; }
    .hero {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 30px;
      box-shadow: 0 22px 60px rgba(30,64,175,.14);
      padding: 34px;
      margin-bottom: 20px;
    }
    .hero h2 { color: #1e3a8a; font-size: 30px; margin-bottom: 8px; }
    .hero p { color: #64748b; line-height: 1.8; }
    .form {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    label { display: block; font-weight: 800; color: #1e3a8a; margin-bottom: 8px; font-size: 14px; }
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: white;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,.10); }
    button {
      border: none;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(37,99,235,.18);
    }
    .msg {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      line-height: 1.7;
    }
    .msg.err { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .msg.ok { display: block; background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .order-card {
      display: none;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 30px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(30,64,175,.10);
    }
    .order-card.show { display: block; }
    .order-head { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .order-title { font-size: 22px; font-weight: 900; color: #1e3a8a; }
    .order-meta { color: #64748b; font-size: 13px; margin-top: 5px; }
    .badge {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      height: fit-content;
    }
    .badge.new, .badge.contacted { background: #dbeafe; color: #1d4ed8; }
    .badge.quoted, .badge.paid, .badge.doing { background: #fef3c7; color: #b45309; }
    .badge.done { background: #dcfce7; color: #15803d; }
    .badge.cancel { background: #fee2e2; color: #b91c1c; }
    .grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin: 16px 0; }
    .info {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 18px;
      padding: 13px;
    }
    .info span { display: block; color: #64748b; font-size: 12px; margin-bottom: 4px; }
    .info b { color: #334155; word-break: break-all; }
    .timeline { margin-top: 22px; }
    .timeline h3 { color: #1e3a8a; margin-bottom: 14px; }
    .step {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 12px;
      position: relative;
      padding-bottom: 18px;
    }
    .step:not(:last-child)::after {
      content: "";
      position: absolute;
      left: 15px;
      top: 32px;
      bottom: 0;
      width: 2px;
      background: #dbeafe;
    }
    .dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: grid; place-items: center; font-size: 14px; font-weight: 900;
      background: #e2e8f0; color: #64748b; z-index: 1;
    }
    .step.active .dot { background: #2563eb; color: white; }
    .step.done .dot { background: #16a34a; color: white; }
    .step.cancel .dot { background: #dc2626; color: white; }
    .step-content {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 18px;
      padding: 12px 14px;
    }
    .step-content strong { color: #1e3a8a; }
    .step-content p { color: #64748b; margin-top: 4px; font-size: 14px; line-height: 1.7; }
    .public-note {
      margin-top: 20px;
      background: #eff6ff;
      border-left: 5px solid #2563eb;
      color: #1e3a8a;
      border-radius: 14px;
      padding: 16px;
      line-height: 1.8;
    }
    .details {
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 18px;
      padding: 14px;
      color: #334155;
      white-space: pre-wrap;
      line-height: 1.8;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .top { display: block; }
      .top a { display: inline-block; margin-top: 12px; }
      .hero, .order-card { padding: 22px; border-radius: 24px; }
      .hero h2 { font-size: 24px; }
      .form { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="brand">
        <div class="logo">蔡</div>
        <div>
          <h1>订单进度查询</h1>
          <p>小蔡同学文档工作室</p>
        </div>
      </div>
      <a href="/">返回首页</a>
    </div>

    <section class="hero">
      <h2>查询你的订单进度</h2>
      <p>请输入提交需求后生成的订单号，以及当时填写的联系方式。为了保护隐私，订单号和联系方式需要同时匹配才能查看。</p>

      <div class="form">
        <div>
          <label for="orderNo">订单号</label>
          <input id="orderNo" placeholder="例如：XC20260526123456">
        </div>
        <div>
          <label for="contact">联系方式</label>
          <input id="contact" placeholder="填写提交订单时的微信 / QQ / 手机号">
        </div>
        <button onclick="trackOrder()">查询进度</button>
      </div>

      <div id="msg" class="msg"></div>
    </section>

    <section id="orderCard" class="order-card">
      <div class="order-head">
        <div>
          <div class="order-title" id="orderTitle"></div>
          <div class="order-meta" id="orderMeta"></div>
        </div>
        <span id="statusBadge" class="badge"></span>
      </div>

      <div class="grid">
        <div class="info"><span>称呼</span><b id="name"></b></div>
        <div class="info"><span>服务类型</span><b id="service"></b></div>
        <div class="info"><span>截止时间</span><b id="deadline"></b></div>
        <div class="info"><span>订单金额</span><b id="price"></b></div>
      </div>

      <div class="timeline">
        <h3>当前进度</h3>
        <div id="timeline"></div>
      </div>

      <div id="publicNoteBox" class="public-note" style="display:none;"></div>

      <div class="details">
        <strong>你的需求：</strong>
        <div id="details"></div>
      </div>
    </section>
  </div>

  <script>
    const statusText = {
      new: "新订单",
      contacted: "已联系",
      quoted: "已报价",
      paid: "已收款",
      doing: "制作中",
      done: "已完成",
      cancel: "已取消"
    };

    const statusDesc = {
      new: "已收到你的需求，等待确认。",
      contacted: "已联系客户，正在确认具体要求。",
      quoted: "已根据需求完成报价，等待确认。",
      paid: "已确认收款，即将开始或已经进入制作。",
      doing: "正在制作中，请耐心等待。",
      done: "订单已完成，如有小问题可继续沟通。",
      cancel: "订单已取消。"
    };

    const normalSteps = ["new", "contacted", "quoted", "paid", "doing", "done"];

    function getQuery(name) {
      const url = new URL(location.href);
      return url.searchParams.get(name) || "";
    }

    function showMsg(type, text) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type;
      msg.textContent = text;
    }

    function clearMsg() {
      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "";
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[s]));
    }

    async function trackOrder() {
      clearMsg();
      document.getElementById("orderCard").classList.remove("show");

      const orderNo = document.getElementById("orderNo").value.trim();
      const contact = document.getElementById("contact").value.trim();

      if (!orderNo || !contact) {
        showMsg("err", "请填写订单号和联系方式。");
        return;
      }

      try {
        const res = await fetch("/api/track", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ orderNo, contact })
        });

        const data = await res.json();
        if (!data.success) {
          showMsg("err", data.message || "未查询到订单，请检查订单号和联系方式。");
          return;
        }

        renderOrder(data.order);
        showMsg("ok", "查询成功。");
      } catch (e) {
        showMsg("err", "查询失败，请稍后重试，或直接联系微信17781762502。");
      }
    }

    function renderTimeline(status) {
      if (status === "cancel") {
        return `
          <div class="step cancel">
            <div class="dot">×</div>
            <div class="step-content">
              <strong>订单已取消</strong>
              <p>该订单已取消，如有疑问可以直接联系我。</p>
            </div>
          </div>
        `;
      }

      const currentIndex = normalSteps.indexOf(status);
      return normalSteps.map((step, i) => {
        const cls = i < currentIndex ? "done" : (i === currentIndex ? "active" : "");
        const icon = i < currentIndex ? "✓" : (i === currentIndex ? "●" : i + 1);
        return `
          <div class="step ${cls}">
            <div class="dot">${icon}</div>
            <div class="step-content">
              <strong>${statusText[step]}</strong>
              <p>${statusDesc[step]}</p>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderOrder(o) {
      const st = o.status || "new";
      document.getElementById("orderTitle").textContent = `${o.service}｜${o.orderNo}`;
      document.getElementById("orderMeta").textContent = `提交时间：${o.createdAt || ""}${o.updatedAt ? "｜更新时间：" + o.updatedAt : ""}`;
      const badge = document.getElementById("statusBadge");
      badge.className = "badge " + st;
      badge.textContent = statusText[st] || "新订单";

      document.getElementById("name").textContent = o.name || "";
      document.getElementById("service").textContent = o.service || "";
      document.getElementById("deadline").textContent = o.deadline || "未填写";
      document.getElementById("price").textContent = o.price ? "¥" + o.price : "待确认";
      document.getElementById("details").innerHTML = escapeHtml(o.details || "");
      document.getElementById("timeline").innerHTML = renderTimeline(st);

      const publicNoteBox = document.getElementById("publicNoteBox");
      if (o.publicNote) {
        publicNoteBox.style.display = "block";
        publicNoteBox.innerHTML = "<strong>进度说明：</strong><br>" + escapeHtml(o.publicNote);
      } else {
        publicNoteBox.style.display = "none";
      }

      document.getElementById("orderCard").classList.add("show");
    }

    const prefill = getQuery("orderNo");
    if (prefill) {
      document.getElementById("orderNo").value = prefill;
    }
  </script>
</body>
</html>
