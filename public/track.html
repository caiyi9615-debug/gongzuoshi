<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>订单进度</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",Arial,sans-serif}html{scroll-behavior:smooth}body{background:#f5f7fb;color:#172033;line-height:1.7}.fade{opacity:0;transform:translateY(24px);transition:.7s}.fade.show{opacity:1;transform:translateY(0)}a{color:#2563eb;text-decoration:none;font-weight:700}.hero{background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.22),transparent 28%),linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;padding:72px 20px;text-align:center}.hero h1{font-size:40px;margin-bottom:14px}.hero p{max-width:840px;margin:0 auto 24px;font-size:18px}.btn,button{border:0;border-radius:999px;padding:12px 24px;font-weight:800;cursor:pointer;transition:.25s;display:inline-block}.btn{background:#fff;color:#1e40af;margin:6px;box-shadow:0 12px 26px rgba(0,0,0,.12)}.btn.secondary{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.5)}button{background:#2563eb;color:white}.btn:hover,button:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 16px 32px rgba(37,99,235,.18)}.container{max-width:1120px;margin:0 auto;padding:44px 20px}.title{text-align:center;font-size:30px;color:#1e3a8a;margin-bottom:10px}.sub{text-align:center;color:#64748b;max-width:760px;margin:0 auto 28px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.card,.box{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 22px rgba(30,64,175,.08);transition:.25s}.card:hover,.box:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(30,64,175,.14)}.card h3{color:#2563eb;margin-bottom:8px}.tag{display:inline-block;background:#eff6ff;color:#1e40af;padding:4px 10px;border-radius:999px;font-size:13px;margin:3px}.table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(30,64,175,.08)}.table th,.table td{padding:15px;text-align:center;border-bottom:1px solid #eee}.table th{background:#2563eb;color:#fff}.table tr:hover td{background:#f8fbff}.notice{margin-top:18px;background:#eff6ff;border-left:5px solid #2563eb;border-radius:12px;padding:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.full{grid-column:1/-1}label{display:block;color:#1e3a8a;font-weight:800;margin-bottom:6px}input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:15px;outline:none;transition:.2s;background:#fff}textarea{min-height:112px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.1);transform:translateY(-1px)}.result{display:none;margin-top:16px;padding:16px;border-radius:12px}.success{display:block;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}.error{display:block;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}.code{background:white;border:1px dashed #10b981;border-radius:10px;padding:10px;margin:10px 0;color:#065f46;font-weight:800;word-break:break-all}.paygrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:14px}.paycard{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;text-align:center}.paycard img{width:100%;max-width:260px;border-radius:12px;margin-top:8px}.footer{text-align:center;color:#777;padding:25px}.top{max-width:980px;margin:0 auto 20px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#1e40af);color:white;font-weight:900;font-size:22px}.page{max-width:980px;margin:0 auto;padding:22px}.glass{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.75);border-radius:30px;box-shadow:0 22px 60px rgba(30,64,175,.14);padding:28px;margin-bottom:20px}.badge{display:inline-flex;padding:8px 13px;border-radius:999px;font-size:13px;font-weight:900}.pending_payment,.payment_review,.new,.contacted{background:#dbeafe;color:#1d4ed8}.deposit_paid,.quoted,.paid,.doing,.final_payment_due,.final_payment_review{background:#fef3c7;color:#b45309}.balance_paid,.ready_delivery,.delivered,.done{background:#dcfce7;color:#15803d}.cancel{background:#fee2e2;color:#b91c1c}.infogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.info{background:#f8fafc;border:1px solid #edf2f7;border-radius:16px;padding:12px}.info span{display:block;color:#64748b;font-size:12px}.timeline{margin-top:20px}.step{display:grid;grid-template-columns:32px 1fr;gap:12px;position:relative;padding-bottom:16px}.step:not(:last-child)::after{content:"";position:absolute;left:15px;top:32px;bottom:0;width:2px;background:#dbeafe}.dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#e2e8f0;color:#64748b;font-weight:900;z-index:1}.step.active .dot{background:#2563eb;color:white}.step.done .dot{background:#16a34a;color:white}.step.cancel .dot{background:#dc2626;color:white}.stepbody{background:#f8fafc;border:1px solid #edf2f7;border-radius:16px;padding:12px}.note{margin-top:16px;background:#eff6ff;border-left:5px solid #2563eb;border-radius:14px;padding:15px;color:#1e3a8a}.deliver{margin-top:16px;background:#ecfdf5;border-left:5px solid #16a34a;border-radius:14px;padding:15px;color:#065f46}
.save-mask{position:fixed;inset:0;background:rgba(15,23,42,.48);backdrop-filter:blur(6px);display:none;place-items:center;padding:20px;z-index:99}
.save-mask.show{display:grid}
.save-modal{width:min(520px,100%);background:white;border-radius:26px;padding:24px;box-shadow:0 24px 80px rgba(15,23,42,.25);text-align:center}
.save-modal h2{color:#1e3a8a;margin-bottom:10px}
.save-modal p{color:#64748b;margin-bottom:12px}
.save-code{background:#eff6ff;border:1px dashed #2563eb;border-radius:14px;padding:12px;margin:14px 0;color:#1e40af;font-weight:900;word-break:break-all}
.save-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.save-actions .ghost{background:#f1f5f9;color:#334155}
@media(max-width:760px){.hero h1{font-size:30px}.grid,.infogrid{grid-template-columns:1fr}.top{display:block}.glass{padding:22px;border-radius:24px}.table th,.table td{padding:10px 6px;font-size:13px}}
body{background:radial-gradient(circle at 12% 10%,rgba(59,130,246,.22),transparent 30%),linear-gradient(135deg,#f8fbff,#eef4ff)}@keyframes rise{to{opacity:1;transform:translateY(0)}}.page{opacity:0;transform:translateY(20px);animation:rise .65s forwards}</style></head>
<body><div class="page"><div class="top"><div class="brand"><div class="logo">蔡</div><div><h2 style="color:#1e3a8a">订单进度</h2><p style="color:#64748b">定金 / 尾款 / 文件交付</p></div></div><a href="/">返回首页</a></div>
<section id="manual" class="glass"><h2 style="color:#1e3a8a">查询订单进度</h2><p style="color:#64748b">通过专属链接进入会自动显示订单，也可以输入订单号和联系方式查询。</p><div class="grid" style="margin-top:16px"><div><label>订单号</label><input id="orderNo"></div><div><label>联系方式</label><input id="contact"></div><div class="full"><button onclick="manualTrack()">查询</button></div></div><div id="msg" class="result"></div></section>
<section id="orderCard" class="glass" style="display:none"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap"><div><h2 id="orderTitle" style="color:#1e3a8a"></h2><p id="orderMeta" style="color:#64748b"></p></div><span id="badge" class="badge"></span></div>
<div class="infogrid" style="margin-top:16px"><div class="info"><span>称呼</span><b id="oName"></b></div><div class="info"><span>服务</span><b id="oService"></b></div><div class="info"><span>定金</span><b id="oDeposit"></b></div><div class="info"><span>尾款</span><b id="oBalance"></b></div></div>
<div id="depositBox" class="glass" style="box-shadow:none;margin-top:18px"><h2 style="color:#1e3a8a">支付定金</h2><p style="color:#64748b">请扫码支付定金，付款时建议备注订单号。支付后填写付款备注，我确认后会开始处理。</p><div class="paygrid"><div class="paycard"><b>微信支付</b><img src="/assets/wechatpay.jpg"></div><div class="paycard"><b>支付宝</b><img src="/assets/alipay.jpg"></div></div><label style="margin-top:14px">定金付款备注</label><textarea id="paymentNote" placeholder="例如：已微信支付5元，昵称xxx，时间xx:xx"></textarea><button style="margin-top:10px" onclick="submitPayNote()">我已支付定金，提交备注</button></div>
<div id="balanceBox" class="glass" style="box-shadow:none;margin-top:18px;display:none"><h2 style="color:#1e3a8a">补尾款后移交文件</h2><p style="color:#64748b">订单已完成，需补尾款后才能移交文件。请扫码支付尾款，付款后提交付款备注。</p><div class="paygrid"><div class="paycard"><b>微信支付</b><img src="/assets/wechatpay.jpg"></div><div class="paycard"><b>支付宝</b><img src="/assets/alipay.jpg"></div></div><label style="margin-top:14px">尾款付款备注</label><textarea id="balanceNote" placeholder="例如：已支付宝补尾款xx元，昵称xxx，时间xx:xx"></textarea><button style="margin-top:10px" onclick="submitBalanceNote()">我已补尾款，提交备注</button></div>
<div id="deliverBox" class="deliver" style="display:none"></div>
<div class="timeline"><h3 style="color:#1e3a8a;margin-bottom:12px">当前进度</h3><div id="timeline"></div></div><div id="publicNote" class="note" style="display:none"></div><div class="glass" style="box-shadow:none;margin-top:18px"><b>你的需求：</b><div id="details" style="white-space:pre-wrap"></div></div><button class="btn" onclick="copyLink()">复制本订单链接</button></section></div>

<div id="saveOrderMask" class="save-mask">
  <div class="save-modal">
    <h2>请保存订单号</h2>
    <p>为了方便后续查询进度，请复制并保存你的订单号。也建议同时保存订单链接。</p>
    <div id="saveOrderCode" class="save-code"></div>
    <div class="save-actions">
      <button type="button" onclick="copyOrderNoOnly()">复制订单号</button>
      <button type="button" onclick="copyOrderLinkOnly()">复制订单链接</button>
      <button type="button" class="ghost" onclick="closeSaveOrderModal()">我已保存</button>
    </div>
  </div>
</div>

<script>
let current=null;

function showSaveOrderModal(){
  if(!current) return;
  document.getElementById("saveOrderCode").textContent = current.orderNo || "";
  document.getElementById("saveOrderMask").classList.add("show");
}

function closeSaveOrderModal(){
  document.getElementById("saveOrderMask").classList.remove("show");
}

async function copyOrderNoOnly(){
  if(!current) return;
  try{
    await navigator.clipboard.writeText(current.orderNo || "");
    alert("订单号已复制，请妥善保存。");
  }catch(e){
    prompt("请手动复制订单号：", current.orderNo || "");
  }
}

async function copyOrderLinkOnly(){
  try{
    await navigator.clipboard.writeText(location.href);
    alert("订单链接已复制，请妥善保存。");
  }catch(e){
    prompt("请手动复制订单链接：", location.href);
  }
}
const txt={pending_payment:"待付定金",payment_review:"待确认定金",deposit_paid:"已付定金",doing:"制作中",final_payment_due:"待补尾款",final_payment_review:"待确认尾款",balance_paid:"尾款已确认",delivered:"已移交文件",done:"已完成",cancel:"已取消"},desc={pending_payment:"订单已生成，请支付定金以确认需求。",payment_review:"已收到定金付款备注，正在确认。",deposit_paid:"定金已确认，订单已进入处理流程。",doing:"正在制作中，请耐心等待。",final_payment_due:"订单已完成，请补齐尾款后移交文件。",final_payment_review:"已收到尾款付款备注，正在确认。",balance_paid:"尾款已确认，即将移交文件。",delivered:"文件已移交，请查收。",done:"订单已完成。",cancel:"订单已取消。"};const steps=["pending_payment","payment_review","deposit_paid","doing","final_payment_due","final_payment_review","balance_paid","delivered"];
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function pathNo(){let p=location.pathname.split("/").filter(Boolean);return p[0]==="track"&&p[1]?p[1]:""}function key(){return new URL(location.href).searchParams.get("key")||""}
function timeline(status){if(status==="cancel")return `<div class="step cancel"><div class="dot">×</div><div class="stepbody"><b>订单已取消</b><p>如有疑问可以直接联系我。</p></div></div>`;let idx=Math.max(0,steps.indexOf(status));return steps.map((s,i)=>`<div class="step ${i<idx?"done":i===idx?"active":""}"><div class="dot">${i<idx?"✓":i===idx?"●":i+1}</div><div class="stepbody"><b>${txt[s]}</b><p>${desc[s]}</p></div></div>`).join("")}
function render(o){current=o;let st=o.status||"pending_payment";orderTitle.textContent=`${o.service}｜${o.orderNo}`;orderMeta.textContent=`提交时间：${o.createdAt||""}${o.updatedAt?"｜更新时间："+o.updatedAt:""}`;badge.className="badge "+st;badge.textContent=txt[st]||st;oName.textContent=o.name||"";oService.textContent=o.service||"";oDeposit.textContent=o.deposit?"¥"+o.deposit:"待确认";oBalance.textContent=o.balanceDue?"¥"+o.balanceDue:"待确认";details.innerHTML=esc(o.details);document.getElementById("timeline").innerHTML=timeline(st);depositBox.style.display=["pending_payment","payment_review"].includes(st)?"block":"none";balanceBox.style.display=["final_payment_due","final_payment_review"].includes(st)?"block":"none";if(o.publicNote){publicNote.style.display="block";publicNote.innerHTML="<b>进度说明：</b><br>"+esc(o.publicNote)}else publicNote.style.display="none";if(["balance_paid","delivered","done"].includes(st)&&(o.deliveryLink||o.deliveryNote)){deliverBox.style.display="block";deliverBox.innerHTML=`<b>文件交付：</b><br>${o.deliveryNote?esc(o.deliveryNote)+"<br>":""}${o.deliveryLink?`<a href="${esc(o.deliveryLink)}" target="_blank">点击查看/下载文件</a>`:""}`}else deliverBox.style.display="none";orderCard.style.display="block"}
async function autoTrack(){let no=pathNo();if(!no||!key())return;manual.style.display="none";let r=await fetch(`/api/track/${encodeURIComponent(no)}?key=${encodeURIComponent(key())}`),d=await r.json();if(d.success)render(d.order);else{manual.style.display="block";msg.className="result error";msg.textContent=d.message||"订单链接无效"}}
async function manualTrack(){let r=await fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({orderNo:orderNo.value.trim(),contact:contact.value.trim()})}),d=await r.json();if(d.success){msg.className="result success";msg.textContent="查询成功";render(d.order)}else{msg.className="result error";msg.textContent=d.message||"未查询到订单"}}
async function submitPayNote(){if(!current)return;let note=paymentNote.value.trim();if(!note)return alert("请填写定金付款备注");let r=await fetch(`/api/payment-note/${encodeURIComponent(current.orderNo)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:current.trackKey,paymentNote:note})}),d=await r.json();if(d.success){render(d.order);showSaveOrderModal()}else alert(d.message||"提交失败")}
async function submitBalanceNote(){if(!current)return;let note=balanceNote.value.trim();if(!note)return alert("请填写尾款付款备注");let r=await fetch(`/api/balance-note/${encodeURIComponent(current.orderNo)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:current.trackKey,balancePaymentNote:note})}),d=await r.json();if(d.success){render(d.order);showSaveOrderModal()}else alert(d.message||"提交失败")}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>alert("已复制"))}autoTrack();
</script></body></html>
