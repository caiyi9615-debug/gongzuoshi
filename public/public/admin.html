<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>订单后台</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",Arial,sans-serif}body{min-height:100vh;background:linear-gradient(135deg,#f8fbff,#eef4ff);color:#172033}button{border:0;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer;transition:.2s}button:hover{transform:translateY(-2px)}.p{background:#2563eb;color:white}.g{background:#f1f5f9;color:#334155}.d{background:#fee2e2;color:#b91c1c}input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:14px}textarea{min-height:86px}.login{min-height:100vh;display:grid;place-items:center}.card,.order,.modal{background:white;border-radius:24px;box-shadow:0 18px 50px rgba(30,64,175,.12);padding:22px}.login .card{width:min(430px,90%)}label{display:block;margin:10px 0 6px;color:#1e3a8a;font-weight:800}.app{display:none;grid-template-columns:250px 1fr;min-height:100vh}.app.show{display:grid}.side{background:rgba(255,255,255,.75);padding:22px;border-right:1px solid #e2e8f0}.logo{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:#2563eb;color:white;font-weight:900}.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.nav{padding:13px;border-radius:16px;margin:8px 0;font-weight:800;cursor:pointer}.nav:hover{background:#dbeafe;color:#1d4ed8}.main{padding:24px}.top{display:flex;justify-content:space-between;margin-bottom:18px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}.stat{background:white;border-radius:18px;padding:16px;box-shadow:0 8px 22px rgba(30,64,175,.08)}.stat span{color:#64748b;font-weight:800;font-size:13px}.stat b{display:block;font-size:26px;color:#2563eb}.filters{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr auto;gap:10px;align-items:end;background:white;border-radius:20px;padding:16px;margin-bottom:16px}.orders{display:grid;gap:12px}.order{transition:.2s}.order:hover{transform:translateY(-3px)}.head{display:flex;justify-content:space-between}.title{font-weight:900;color:#1e3a8a;font-size:18px}.meta{font-size:12px;color:#64748b}.badge{padding:7px 11px;border-radius:999px;font-size:12px;font-weight:900}.pending_payment,.payment_review{background:#dbeafe;color:#1d4ed8}.deposit_paid,.doing{background:#fef3c7;color:#b45309}.done{background:#dcfce7;color:#15803d}.cancel{background:#fee2e2;color:#b91c1c}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.info{background:#f8fafc;border-radius:14px;padding:10px}.info span{display:block;color:#64748b;font-size:12px}.detail{background:#f8fafc;border-radius:14px;padding:10px;white-space:pre-wrap;max-height:100px;overflow:hidden}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;place-items:center;padding:20px}.mask.show{display:grid}.modal{width:min(860px,100%);max-height:90vh;overflow:auto}.edit{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.toast{position:fixed;right:20px;top:20px;display:none;padding:14px;border-radius:14px;font-weight:900}.ok{display:block;background:#ecfdf5;color:#047857}.err{display:block;background:#fef2f2;color:#b91c1c}@media(max-width:900px){.app.show{grid-template-columns:1fr}.stats,.filters,.grid,.edit{grid-template-columns:1fr}.side{border-right:0}.top,.head{display:block}}
</style></head><body>
<div id="toast" class="toast"></div><section id="login" class="login"><div class="card"><div class="brand"><div class="logo">蔡</div><div><h2>订单后台</h2><p style="color:#64748b">定金确认 / 进度管理</p></div></div><label>后台密码</label><input id="password" type="password" placeholder="默认 123456"><button class="p" style="width:100%;margin-top:14px" onclick="login()">进入</button></div></section>
<section id="app" class="app"><aside class="side"><div class="brand"><div class="logo">蔡</div><div><h3>小蔡工作室</h3><p style="color:#64748b">后台</p></div></div><div class="nav" onclick="location.reload()">📋 订单管理</div><div class="nav" onclick="window.open('/')">🌐 前台</div><div class="nav" onclick="window.open('/track')">🔎 查询页</div><button class="g" onclick="logout()">退出</button></aside><main class="main"><div class="top"><div><h1>订单管理</h1><p style="color:#64748b">确认定金、修改状态、复制顾客链接。</p></div><div><button class="g" onclick="loadOrders()">刷新</button><button class="g" onclick="exportCSV()">导出CSV</button></div></div><div class="stats"><div class="stat"><span>全部</span><b id="total">0</b></div><div class="stat"><span>待付</span><b id="pending">0</b></div><div class="stat"><span>待确认</span><b id="review">0</b></div><div class="stat"><span>制作中</span><b id="doing">0</b></div><div class="stat"><span>收入</span><b id="income">¥0</b></div></div><div class="filters"><div><label>搜索</label><input id="kw"></div><div><label>服务</label><select id="sv"><option value="">全部</option><option>PPT美化</option><option>Word排版</option><option>简历优化</option><option>学习计划网页</option><option>课程资料整理</option><option>网页二维码制作</option><option>其他需求</option></select></div><div><label>状态</label><select id="sf"><option value="">全部</option><option value="pending_payment">待付定金</option><option value="payment_review">待确认定金</option><option value="deposit_paid">已付定金</option><option value="doing">制作中</option><option value="done">完成</option><option value="cancel">取消</option></select></div><div><label>排序</label><select id="sort"><option value="new">最新</option><option value="old">最早</option></select></div><button class="p" onclick="filter()">筛选</button></div><div id="orders" class="orders"></div></main></section>
<div id="mask" class="mask"><div class="modal"><div class="head"><div><h2 style="color:#1e3a8a">订单详情</h2><p style="color:#64748b">顾客可见说明会展示在进度页。</p></div><button class="g" onclick="closeModal()">×</button></div><div class="edit"><input type="hidden" id="eid"><div><label>订单号</label><input id="eNo" readonly></div><div><label>称呼</label><input id="eName"></div><div><label>联系方式</label><input id="eContact"></div><div><label>服务</label><input id="eService"></div><div><label>状态</label><select id="eStatus"><option value="pending_payment">待付定金</option><option value="payment_review">待确认定金</option><option value="deposit_paid">已付定金</option><option value="doing">制作中</option><option value="done">完成</option><option value="cancel">取消</option></select></div><div><label>定金</label><input id="eDeposit"></div><div><label>总金额</label><input id="ePrice"></div><div><label>截止时间</label><input id="eDeadline"></div><div class="full"><label>付款备注</label><textarea id="ePaymentNote"></textarea></div><div class="full"><label>顾客可见说明</label><textarea id="ePublicNote"></textarea></div><div class="full"><label>需求</label><textarea id="eDetails"></textarea></div><div class="full"><label>内部备注</label><textarea id="eNote"></textarea></div><div class="full actions"><button class="p" onclick="saveEdit()">保存</button><button class="g" onclick="copyLink()">复制顾客链接</button><button class="d" onclick="delOrder()">删除</button></div></div></div></div>
<script>
let token=localStorage.getItem("adminToken")||"",data=[],cur=null;const st={pending_payment:"待付定金",payment_review:"待确认定金",deposit_paid:"已付定金",doing:"制作中",done:"完成",cancel:"取消"};
function t(c,m){toast.className="toast "+c;toast.textContent=m;setTimeout(()=>toast.className="toast",2200)}
async function login(){let r=await fetch("/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:password.value})}),d=await r.json();if(d.success){token=d.token;localStorage.setItem("adminToken",token);document.getElementById("login").style.display="none";app.classList.add("show");loadOrders()}else t("err",d.message)}
function logout(){localStorage.removeItem("adminToken");location.reload()}
async function loadOrders(){let r=await fetch("/api/admin/orders",{headers:{Authorization:"Bearer "+token}});if(r.status===401)return logout();data=await r.json();stats();filter()}
function stats(){total.textContent=data.length;pending.textContent=data.filter(o=>o.status==="pending_payment").length;review.textContent=data.filter(o=>o.status==="payment_review").length;doing.textContent=data.filter(o=>o.status==="doing").length;income.textContent="¥"+data.reduce((s,o)=>s+(parseFloat(o.price)||0),0).toFixed(1)}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function filter(){let list=[...data],k=kw.value.toLowerCase();if(k)list=list.filter(o=>JSON.stringify(o).toLowerCase().includes(k));if(sv.value)list=list.filter(o=>o.service===sv.value);if(sf.value)list=list.filter(o=>o.status===sf.value);list.sort((a,b)=>sort.value==="old"?a.id-b.id:b.id-a.id);render(list)}
function render(list){orders.innerHTML=list.length?list.map(o=>`<div class="order"><div class="head"><div><div class="title">${esc(o.service)}｜${esc(o.name)}</div><div class="meta">订单号：${esc(o.orderNo)}｜${esc(o.createdAt||"")}</div></div><span class="badge ${o.status}">${st[o.status]||o.status}</span></div><div class="grid"><div class="info"><span>联系方式</span><b>${esc(o.contact)}</b></div><div class="info"><span>定金</span><b>¥${esc(o.deposit)}</b></div><div class="info"><span>金额</span><b>${o.price?"¥"+esc(o.price):"未填"}</b></div><div class="info"><span>付款备注</span><b>${o.paymentNote?"已填写":"暂无"}</b></div></div><div class="detail">${esc(o.details)}</div><div class="actions"><button class="p" onclick="openEdit(${o.id})">编辑</button><button class="g" onclick="quick(${o.id},'deposit_paid')">确认定金</button><button class="g" onclick="quick(${o.id},'doing')">制作中</button><button class="g" onclick="quick(${o.id},'done')">完成</button></div></div>`).join(""):'<div class="order">暂无订单</div>'}
function openEdit(id){let o=data.find(x=>x.id===id);cur=o;eid.value=o.id;eNo.value=o.orderNo;eName.value=o.name||"";eContact.value=o.contact||"";eService.value=o.service||"";eStatus.value=o.status||"pending_payment";eDeposit.value=o.deposit||"";ePrice.value=o.price||"";eDeadline.value=o.deadline||"";ePaymentNote.value=o.paymentNote||"";ePublicNote.value=o.publicNote||"";eDetails.value=o.details||"";eNote.value=o.note||"";mask.classList.add("show")}
function closeModal(){mask.classList.remove("show");cur=null}
async function saveEdit(){let p={name:eName.value,contact:eContact.value,service:eService.value,status:eStatus.value,deposit:eDeposit.value,price:ePrice.value,deadline:eDeadline.value,paymentNote:ePaymentNote.value,publicNote:ePublicNote.value,details:eDetails.value,note:eNote.value};let r=await fetch("/api/admin/orders/"+eid.value,{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify(p)}),d=await r.json();if(d.success){t("ok","已保存");closeModal();loadOrders()}}
async function quick(id,status){let note=status==="deposit_paid"?"定金已确认，我会尽快处理你的需求。":status==="doing"?"正在制作中，请耐心等待。":status==="done"?"订单已完成，感谢信任。":undefined;let p={status};if(note)p.publicNote=note;let r=await fetch("/api/admin/orders/"+id,{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify(p)}),d=await r.json();if(d.success){t("ok","状态已更新");loadOrders()}}
async function delOrder(){if(!confirm("确定删除？"))return;let r=await fetch("/api/admin/orders/"+eid.value,{method:"DELETE",headers:{Authorization:"Bearer "+token}}),d=await r.json();if(d.success){t("ok","已删除");closeModal();loadOrders()}}
function copyLink(){let link=location.origin+`/track/${encodeURIComponent(cur.orderNo)}?key=${encodeURIComponent(cur.trackKey)}`;navigator.clipboard.writeText(`你的订单进度链接：${link}\n定金：${cur.deposit}元，定金可抵扣尾款。`).then(()=>t("ok","已复制"))}
function exportCSV(){let csv=["订单号,称呼,联系方式,服务,状态,定金,金额,付款备注,顾客说明,内部备注"].concat(data.map(o=>[o.orderNo,o.name,o.contact,o.service,st[o.status],o.deposit,o.price,o.paymentNote,o.publicNote,o.note].map(x=>`"${String(x||"").replace(/"/g,'""')}"`).join(","))).join("\\n");let blob=new Blob(["\\ufeff"+csv],{type:"text/csv"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="订单.csv";a.click()}
[kw,sv,sf,sort].forEach(x=>x.addEventListener("input",filter));if(token){document.getElementById("login").style.display="none";app.classList.add("show");loadOrders()}
</script></body></html>
